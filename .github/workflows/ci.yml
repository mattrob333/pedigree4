name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -r services/api/requirements-dev.txt
      - name: Validate repository structure
        run: python scripts/validate_structure.py
      - name: Lint backend
        run: python -m ruff check services tests scripts
      - name: Test backend
        run: python -m pytest tests/unit

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - name: Typecheck frontend
        run: npm run typecheck --workspace @pedigree/web
      - name: Build frontend
        run: npm run build --workspace @pedigree/web

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate demo compose config
        run: docker compose -f docker-compose.demo.yml config --quiet

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pedigree
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: pedigree_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mock-microsoft:
    build:
      context: .
      dockerfile: services/mock_microsoft/Dockerfile
    ports:
      - "9000:9000"
    volumes:
      - ./demo/mock_data:/app/mock_data:ro

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      - DEMO_MODE=true
      - DATABASE_URL=postgresql://pedigree:demo@postgres:5432/pedigree_demo
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_URL=redis://redis:6379
      - MOCK_MICROSOFT_URL=http://mock-microsoft:9000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - neo4j
      - redis
      - mock-microsoft

  ui:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  neo4j_data: